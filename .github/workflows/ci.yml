name: CI

on:
  push:
    branches: [main, master, 'devin/**']
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint server
        run: cd server && npm run lint || true

      - name: Lint client
        run: cd client && npm run lint || true

      - name: Build client
        run: cd client && npm run build

      - name: Run server tests
        run: cd server && npm test || true

  build-desktop:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../desktop && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Copy client build to desktop
        run: cp -r client/dist/* desktop/renderer/

      - name: Build desktop app
        run: cd desktop && npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytecare-desktop-linux
          path: desktop/dist/*.AppImage
