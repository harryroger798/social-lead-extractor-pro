name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            binary_name: snapleads-backend.exe
            electron_cmd: dist:win
            artifact_pattern: "release/SnapLeads*.exe"
          - os: macos-latest
            platform: mac
            binary_name: snapleads-backend
            electron_cmd: dist:mac
            artifact_pattern: "release/SnapLeads-*.zip"

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python backend dependencies
        working-directory: backend
        run: |
          pip install pyinstaller
          pip install "fastapi[standard]" uvicorn psycopg[binary] dnspython "requests[socks]" openpyxl python-multipart aiosqlite pydantic-settings python-dotenv aiohttp-socks openai-whisper fpdf2 duckdb httpx curl_cffi certifi patchright beautifulsoup4

      - name: Install Patchright Chromium browser for bundling (Windows only)
        if: matrix.platform == 'win'
        working-directory: backend
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$(pwd)/patchright_browsers"
          python -m patchright install chromium
          echo "Patchright browsers installed to: $PLAYWRIGHT_BROWSERS_PATH"
          ls -la patchright_browsers/ || true
          du -sh patchright_browsers/ || true
        shell: bash

      - name: Pre-install DuckDB httpfs extension for bundling
        working-directory: backend
        run: |
          python - <<'PYEOF'
          import duckdb, os, zipfile
          con = duckdb.connect()
          ext_dir = os.path.join(os.getcwd(), 'duckdb_extensions')
          os.makedirs(ext_dir, exist_ok=True)
          con.execute("SET extension_directory='%s'" % ext_dir)
          con.execute('INSTALL httpfs')
          print('httpfs installed to ' + ext_dir)
          # Zip extension files so PyInstaller does not try to codesign them
          zip_path = os.path.join(os.getcwd(), 'httpfs_bundle.zip')
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk(ext_dir):
                  for f in files:
                      path = os.path.join(root, f)
                      arcname = os.path.relpath(path, ext_dir)
                      zf.write(path, arcname)
                      print('  zipped: ' + arcname + ' (' + str(os.path.getsize(path)) + ' bytes)')
          print('bundle zip: ' + zip_path + ' (' + str(os.path.getsize(zip_path)) + ' bytes)')
          PYEOF
        shell: bash

      - name: Build PyInstaller backend binary
        working-directory: backend
        run: |
          PATCHRIGHT_DATA=""
          PATCHRIGHT_COLLECT=""
          if [ -d "patchright_browsers" ]; then
            PATCHRIGHT_DATA='--add-data patchright_browsers:patchright_browsers'
            # --collect-all patchright bundles the driver binary (node + package/)
            # which is required for Patchright to spawn the browser process
            PATCHRIGHT_COLLECT='--collect-all patchright'
          else
            # macOS: no Patchright bundling, just import the Python modules
            PATCHRIGHT_COLLECT='--hidden-import=patchright --hidden-import=patchright.async_api'
          fi
          pyinstaller --onefile --name snapleads-backend \
            --hidden-import=app --hidden-import=app.main \
            --hidden-import=app.api --hidden-import=app.api.routes \
            --hidden-import=app.database --hidden-import=app.models \
            --hidden-import=app.services --hidden-import=fastapi \
            --hidden-import=uvicorn --hidden-import=aiosqlite \
            --hidden-import=pydantic_settings --hidden-import=dotenv \
            --hidden-import=dns --hidden-import=requests \
            --hidden-import=openpyxl --hidden-import=multipart \
            --hidden-import=aiohttp_socks \
            --hidden-import=whisper \
            --hidden-import=curl_cffi --hidden-import=curl_cffi.requests \
            --hidden-import=app.services.anti_detection \
            --hidden-import=app.services.keyword_parser \
            --hidden-import=app.services.live_scrapers \
            --hidden-import=app.services.quality_scorer \
            --hidden-import=app.services.features \
            --hidden-import=app.services.extractor \
            --hidden-import=app.services.google_dorking \
            --hidden-import=app.services.reddit_extractor \
            --hidden-import=app.services.proxy_manager \
            --hidden-import=app.services.firecrawl_service \
            --hidden-import=app.services.export_service \
            --hidden-import=app.services.license_service \
            --hidden-import=app.services.platform_scrapers \
            --hidden-import=app.services.captcha_solver \
            --hidden-import=app.services.ai_email_writer \
            --hidden-import=app.services.citation_checker \
            --hidden-import=app.services.gbp_detection \
            --hidden-import=app.services.i18n \
            --hidden-import=app.services.indeed_scraper \
            --hidden-import=app.services.lead_enrichment \
            --hidden-import=app.services.pdf_report \
            --hidden-import=app.services.service_suggestion \
            --hidden-import=app.services.smtp_checker \
            --hidden-import=app.services.yellowpages_scraper \
            --hidden-import=app.services.fxtwitter_api \
            --hidden-import=app.services.pinterest_rss \
            --hidden-import=app.services.bio_link_follower \
            --hidden-import=app.services.verifier \
            --hidden-import=app.services.database_search \
            --hidden-import=app.services.multi_engine_search \
            --hidden-import=app.services.log_service \
            --hidden-import=app.services.patchright_engine \
            --hidden-import=app.services.auto_discovery \
            $PATCHRIGHT_COLLECT \
            --hidden-import=bs4 \
            --hidden-import=duckdb \
            --add-data "httpfs_bundle.zip:." \
            $PATCHRIGHT_DATA \
            --collect-all certifi \
            --hidden-import=httpx \
            --hidden-import=fpdf --collect-all fpdf2 \
            --collect-all fastapi --collect-all uvicorn \
            --collect-all aiosqlite --collect-all pydantic_settings \
            --add-data "app:app" \
            run_server.py
        shell: bash

      - name: Verify backend binary exists
        working-directory: backend
        run: ls -la dist/
        shell: bash

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root npm dependencies
        run: npm install

      - name: Install frontend npm dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron installer
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.platform }}
          path: backend/dist/${{ matrix.binary_name }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | head -50

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer-win/*
            artifacts/installer-mac/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
