<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>TextShift - AI Content Detection & Humanization Tool | 99% Accuracy</title>
    <meta name="title" content="TextShift - AI Content Detection & Humanization Tool | 99% Accuracy" />
    <meta name="description" content="Detect AI-generated content with 99.18% accuracy. Humanize AI text to bypass detection. Free plagiarism checker. 14 writing tools. Trusted by 10,000+ users. Start free today!" />
    <meta name="keywords" content="AI detector, AI content detection, humanize AI text, plagiarism checker, ChatGPT detector, AI writing tools, grammar checker, text humanizer" />
    <meta name="author" content="TextShift" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://textshift.org/" />
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo.png" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="msapplication-TileColor" content="#3B82F6" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://textshift.org/" />
    <meta property="og:title" content="TextShift - AI Content Detection & Humanization Tool" />
    <meta property="og:description" content="Detect AI-generated content with 99.18% accuracy. Humanize AI text instantly. Free plagiarism checker. Start with 5,000 free credits today!" />
    <meta property="og:image" content="https://textshift.org/images/og-image.png" />
    <meta property="og:site_name" content="TextShift" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://textshift.org/" />
    <meta name="twitter:title" content="TextShift - AI Content Detection & Humanization Tool" />
    <meta name="twitter:description" content="Detect AI-generated content with 99.18% accuracy. Humanize AI text instantly. Free plagiarism checker." />
    <meta name="twitter:image" content="https://textshift.org/images/twitter-card.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://api-m.paypal.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api-m.paypal.com" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TextShift",
      "url": "https://textshift.org",
      "logo": "https://textshift.org/images/logo.png",
      "description": "AI content detection and humanization platform with 99.18% accuracy",
      "sameAs": []
    }
    </script>
    
    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TextShift",
      "url": "https://textshift.org",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://textshift.org/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Structured Data - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TextShift",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI content detection, humanization, and writing tools platform",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1250"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
